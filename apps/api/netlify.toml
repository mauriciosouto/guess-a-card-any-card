# Deploy with Base directory = `apps/api` (Site settings → Build & deploy → Base directory).
# Install command (same UI section): cd ../.. && npm ci
# Build runs after install from `apps/api`; `postinstall` on @gac/api already runs `prisma generate`.
#
# Env vars (Functions + build): DATABASE_URL, CORS_ORIGIN, COOP_REALTIME_* as needed.

[build]
  # Paths in netlify.toml are repo-root-relative (even when Base directory = apps/api).
  publish = "apps/api/netlify/public"
  command = "npm run db:deploy"
  # Skip build if no changes in API or shared packages (saves Netlify build minutes).
  # Guard: only apply when CACHED_COMMIT_REF is set (skips on first deploy / new branches).
  ignore = "[ -z \"$CACHED_COMMIT_REF\" ] && exit 1; git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/api packages/shared"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Path repo-root-relative — resolves to /opt/build/repo/apps/api/netlify/functions.
  directory = "apps/api/netlify/functions"
  node_bundler = "esbuild"

# Prisma + pg adapter: keep native deps out of the bundle; copy generated client into the artifact.
# Paths here are repo-root-relative (same as [build] publish / [functions] directory above).
[functions.gac-api]
  external_node_modules = ["@prisma/client", "@prisma/adapter-pg", "pg"]
  included_files = ["apps/api/src/generated/prisma/**"]
